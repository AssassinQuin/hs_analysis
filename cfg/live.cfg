[run]
mode = live
; live: 实时监听
; analyze: 离线分析完整日志
analyze_path =

[log]
; 支持多个候选路径，按顺序取第一个可用项
; 可用分号、逗号或换行分隔
; 每一项可填:
; 1) Power.log 文件路径
; 2) 某局目录路径(目录内含 Power.log)
; 3) Logs 根目录路径(自动选最新一局的 Power.log，跨日期有效)
paths =
    E:\battle\Hearthstone\Logs
poll_interval = 0.05

[engine]
pop_size = 30
max_gens = 80
time_limit = 300
max_chromosome_length = 8
cross_turn = true

[output]
verbose = false
