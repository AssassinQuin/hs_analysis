[run]
mode = live
; live: 实时监听 Power.log
; analyze: 离线分析完整日志
analyze_path =

[log]
; 支持多个候选路径，按顺序取第一个可用项
; 可用分号、逗号或换行分隔
; 每一项可填:
;   1) Power.log 文件路径
;   2) 某局目录路径(目录内含 Power.log)
;   3) Logs 根目录路径(自动选最新一局的 Power.log，跨日期有效)
;
; === 多平台路径配置 ===
; Windows (Battle.net 默认)
;   E:\battle\Hearthstone\Logs
;   C:\Program Files (x86)\Hearthstone\Logs
;   D:\Hearthstone\Logs
;
; macOS
;   ~/Library/Logs/Hearthstone
;
; Linux / Wine
;   ~/.wine/drive_c/Program Files/Hearthstone/Logs
;
; 只需取消注释当前系统对应的路径即可
paths =
    ; --- Windows ---
    E:\battle\Hearthstone\Logs
    C:\Program Files (x86)\Hearthstone\Logs
    ; --- macOS ---
    ~/Library/Logs/Hearthstone
    ; --- Linux / Wine ---
    ~/.wine/drive_c/Program Files/Hearthstone/Logs

poll_interval = 0.05

[engine]
; === 引擎选择 ===
engine = mcts
; [DISABLED] RHEA 已禁用，仅支持 mcts

; === RHEA 参数 [DISABLED] ===
; pop_size = 30
; max_gens = 80
; time_limit = 300
; max_chromosome_length = 8
; cross_turn = true

; === MCTS 参数 ===
time_budget_ms = 8000
; 总时间预算 (ms)
num_worlds = 7
; DUCT 确定性世界数 (5-11)
uct_constant = 0.5
; UCB1 探索常数 c (0.25-1.0; 快攻低/控制高)
time_decay_gamma = 0.6
; 每步指数衰减因子
min_step_budget_ms = 300
; 单步最小预算 (ms)
max_actions_per_turn = 10
; 单回合最大动作数

[output]
verbose = false
; true: 显示详细 debug 日志
show_board = true
; 显示场面状态 (手牌/场面/英雄)
show_probabilities = true
; 显示每个动作的概率和胜率
show_mcts_detail = true
; 显示 MCTS 详细搜索日志 (iter/nodes/evals/iter-per-sec)
log_to_file = false
; 是否同时写入日志文件
log_dir = logs
